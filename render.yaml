services:
  - type: web
    name: logistix-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: chmod +x start_render.sh && ./start_render.sh
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: EXCEL_URL
        sync: false
